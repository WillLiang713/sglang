services:
  sglang:
    image: lmsysorg/sglang:dev
    container_name: Qwen3.6-35B-A3B-FP8
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0", "1"]
              capabilities: [gpu]
    volumes:
      - /home/user/Projects/models:/models
    ports:
      - "8789:8000"
    ipc: host
    entrypoint: python3 -m sglang.launch_server
    command: >
      --model-path /models/Qwen/Qwen3.6-35B-A3B-FP8
      --served-model-name Qwen3.6-35B-A3B-FP8
      --host 0.0.0.0
      --port 8000
      --tp-size 2
      --mem-fraction-static 0.9
      --context-length 262144
      --trust-remote-code
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --watchdog-timeout 1200
      --model-loader-extra-config '{"enable_multithread_load": true}'
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
